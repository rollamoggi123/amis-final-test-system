<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFF4E0">
<title>阿美族語基礎班期末測驗</title>
<style>
  :root {
    --bg: #FFF4E0;
    --surface: #FFFFFF;
    --ink: #3E2723;
    --primary: #E63946;
    --sun: #FFB703;
    --leaf: #00A896;
    --text: #3E2723;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 2rem;
    background-color: var(--bg);
    background-image: radial-gradient(var(--ink) 1.5px, transparent 1.5px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
  }
  main {
    width: min(780px, 100%);
    text-align: center;
    background: var(--surface);
    border: 5px solid var(--ink);
    border-radius: 24px;
    box-shadow: 10px 10px 0 var(--ink);
    padding: clamp(2rem, 5vw, 4rem);
  }
  .badge {
    display: inline-block;
    margin-bottom: 1.5rem;
    padding: 0.45rem 1rem;
    border: 3px solid var(--ink);
    border-radius: 999px;
    background: var(--sun);
    font-weight: 900;
  }
  h1 {
    margin: 0 0 1rem;
    font-size: clamp(2.2rem, 7vw, 4.6rem);
    line-height: 1.08;
    font-weight: 900;
    color: var(--primary);
    text-shadow: 3px 3px 0 var(--ink);
  }
  p {
    margin: 0.75rem 0;
    font-size: clamp(1.1rem, 2.5vw, 1.45rem);
    line-height: 1.7;
    font-weight: 800;
  }
  .note {
    margin-top: 1.5rem;
    padding: 1rem;
    border: 3px dashed var(--ink);
    border-radius: 16px;
    background: #E8F5E9;
  }
</style>
</head>
<body>
  <main>
    <div class="badge">阿美族語基礎班</div>
    <h1>期末測驗已結束</h1>
    <p>謝謝同學完成本次口說測驗。</p>
    <p>本測驗系統目前已關閉，不再接受作答或上傳。</p>
    <div class="note">如有補交、補考或成績相關問題，請洽授課教師蘿拉麻吉 Sonay Rolla Moggi。</div>
  </main>
</body>
</html>
